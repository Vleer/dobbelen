# Production/hosted: uses dedicated prod Dockerfiles.
# Uses .env for CLOUDFLARED_CONFIG_PATH and CLOUDFLARED_TUNNEL_ID (898944.xyz).
# Run: docker compose -f docker-compose.prod.yml --env-file .env up --build -d

services:
  mongodb:
    image: mongo:7.0
    container_name: dobbelen-mongodb-prod
    environment:
      - MONGO_INITDB_DATABASE=dobbelen
    volumes:
      - mongodb-data:/data/db
    networks:
      - dobbelen-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "localhost:27017/dobbelen", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: dobbelen-backend-prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_ADDRESS=0.0.0.0
      - APP_ALLOWED_ORIGINS=https://898944.xyz,https://www.898944.xyz,http://localhost:*,http://127.0.0.1:*,https://localhost,capacitor://localhost
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/dobbelen
    networks:
      - dobbelen-network
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Same-origin so nginx proxies /api and /ws when served at 898944.xyz
        - REACT_APP_BACKEND_URL=
    container_name: dobbelen-frontend-prod
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dobbelen-network
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: dobbelen-cloudflared-prod
    restart: unless-stopped
    user: "1000:1000"
    environment:
      - HOME=/tmp
    depends_on:
      - frontend
    # Mount at same path as on host so config.yml paths (e.g. /home/vleer/.cloudflared/...) work unchanged
    volumes:
      - ${CLOUDFLARED_CONFIG_PATH}:/home/vleer/.cloudflared:ro
    command: tunnel --config /home/vleer/.cloudflared/config.yml run ${CLOUDFLARED_TUNNEL_ID}
    networks:
      - dobbelen-network

networks:
  dobbelen-network:
    driver: bridge

volumes:
  mongodb-data:
