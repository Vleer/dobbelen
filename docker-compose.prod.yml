version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dobbelen-backend-prod
    # No external port exposure - only accessible through frontend proxy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_ADDRESS=0.0.0.0
    networks:
      - dobbelen-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-prod
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dobbelen-network
    restart: unless-stopped

networks:
  dobbelen-network:
    driver: bridge

volumes:
  backend-data:
