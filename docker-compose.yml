version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dobbelen-backend
    # No external port exposure - only accessible through frontend proxy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_ADDRESS=0.0.0.0
    networks:
      - dobbelen-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dobbelen-network

networks:
  dobbelen-network:
    driver: bridge

volumes:
  backend-data:
