# Docker-specific configuration
spring.application.name=backend
server.address=0.0.0.0
server.port=8080

# Restrict CORS to known origins (overridden at deploy time via environment variable if needed)
# app.allowed-origins=https://your-frontend.example.com

# WebSocket configuration
spring.websocket.sockjs.enabled=true

# Logging
logging.level.com.example.backend=DEBUG
logging.level.org.springframework.web=DEBUG

# MongoDB (Docker)
spring.data.mongodb.uri=mongodb://mongo:27017/dobbelen
