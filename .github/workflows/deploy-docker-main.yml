name: Deploy Docker (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy on self-hosted runner
    runs-on:
      - self-hosted
      - linux
      - x64
      - dobbelen-deploy
    env:
      DEPLOY_PATH: /home/vleer/dobbelen

    steps:
      - name: Sync repository
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          git fetch --prune origin main
          git checkout -B main origin/main

      - name: Validate local deploy prerequisites
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }
          docker compose version >/dev/null 2>&1 || { echo "docker compose plugin not found"; exit 1; }
          [ -f docker-compose.prod.yml ] || { echo "docker-compose.prod.yml not found in $DEPLOY_PATH"; exit 1; }
          [ -f .env ] || { echo ".env not found in $DEPLOY_PATH (required for prod compose vars)"; exit 1; }

      - name: Deploy stack
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          docker compose --env-file .env -f docker-compose.prod.yml config >/dev/null
          docker compose --env-file .env -f docker-compose.prod.yml pull || true
          docker compose --env-file .env -f docker-compose.prod.yml up --build -d --remove-orphans
          docker compose --env-file .env -f docker-compose.prod.yml ps
          docker image prune -f

      - name: Deployment summary
        run: |
          echo "### Docker Deploy Complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Repository synced to latest **main** and production compose stack restarted." >> $GITHUB_STEP_SUMMARY
