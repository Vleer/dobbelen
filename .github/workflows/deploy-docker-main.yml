name: Deploy Docker (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy on main push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

            echo "== Preflight =="
            echo "Host: $(hostname)"
            echo "User: $(whoami)"
            echo "Path: ${DEPLOY_PATH}"

            [ -d "${DEPLOY_PATH}" ] || { echo "DEPLOY_PATH not found: ${DEPLOY_PATH}"; exit 1; }
            cd "${DEPLOY_PATH}"

            command -v git >/dev/null 2>&1 || { echo "git not found"; exit 1; }
            command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }
            docker compose version >/dev/null 2>&1 || { echo "docker compose plugin not found"; exit 1; }
            [ -f docker-compose.prod.yml ] || { echo "docker-compose.prod.yml not found in ${DEPLOY_PATH}"; exit 1; }
            [ -f .env ] || { echo ".env not found in ${DEPLOY_PATH} (required for prod compose vars)"; exit 1; }

            echo "== Git sync =="
            git fetch --prune origin main
            git checkout -B main origin/main

            echo "== Compose validate =="
            docker compose --env-file .env -f docker-compose.prod.yml config >/dev/null

            echo "== Deploy =="
            docker compose --env-file .env -f docker-compose.prod.yml pull || true
            docker compose --env-file .env -f docker-compose.prod.yml up --build -d --remove-orphans
            docker compose --env-file .env -f docker-compose.prod.yml ps
            docker image prune -f

      - name: Deployment summary
        run: |
          echo "### Docker Deploy Complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Repository synced to latest **main** and production compose stack restarted." >> $GITHUB_STEP_SUMMARY